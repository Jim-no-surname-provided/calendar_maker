name: Build and release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows executable
    runs-on: windows-latest

    steps:
      - name: Check tag format
        shell: pwsh
        run: |
          if ("${{ github.ref }}" -notmatch "^refs/tags/v[0-9]+(\.[0-9]+)*$") {
            Write-Error "Tag must look like v1, v1.0, v1.2.3, ..."
            exit 1
          }

      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        shell: pwsh
        run: |
          pyinstaller CreadorDeCalendarios.spec

      - name: Create GitHub release
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" `
            "dist/CreadorDeCalendarios.exe" `
            --title "Creador de calendarios ${{ github.ref_name }}" `
            --notes "Release automática para ${{ github.ref_name }}."